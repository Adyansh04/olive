# OLIVE sensor-fusion configuration
#
# One file drives the whole stack:
#   - `modalities` is read by sensor_fusion.launch.py to decide which
#     front-end nodes to start. Any source can be switched off here.
#   - Each node then loads its own `<node_name>: ros__parameters:` section.
#
# Frames follow REP-105: map -> odom -> base_link. The fusion backend owns
# only the map->odom correction; the continuous odom->base_link transform
# comes from the platform (DiffDrive in sim).

modalities:
  lio: true        # LiDAR-inertial odometry front-end        (lio_node)
  wheel: true      # wheel-odometry factors from /odom        (fusion_node input)
  markers: true    # WhyCode fiducial position anchors        (marker_node)
  vo: false        # monocular visual odometry                (vo_node)

lio_node:
  ros__parameters:
    use_sim_time: true
    points_topic: /lidar/points
    imu_topic: /imu/data
    odom_topic: /olive/lidar_odom

fusion_node:
  ros__parameters:
    use_sim_time: true

    map_frame: map
    odom_frame: odom
    base_frame: base_link

    lidar_odom_topic: /olive/lidar_odom
    wheel_odom_topic: /odom
    fused_odom_topic: /olive/odometry

    # Keyframe policy: a new graph pose is created when any threshold trips.
    keyframe_translation_m: 0.5
    keyframe_rotation_deg: 12.0
    keyframe_interval_s: 1.0

    # iSAM2 backend
    relinearize_threshold: 0.1
    relinearize_skip: 1

    # Noise sigmas, ROS order [x, y, z, roll, pitch, yaw].
    # LIO covariance is not well calibrated -> hand-tuned here.
    lidar_between_sigmas: [0.05, 0.05, 0.05, 0.01, 0.01, 0.02]
    # Wheel: tight x/y (metric-scale anchor), loose yaw and z/roll/pitch
    # (diff-drive slip enters through rotation).
    wheel_between_sigmas: [0.03, 0.03, 0.5, 0.5, 0.5, 0.2]
    # Soft planar prior pinning z / roll / pitch for ground motion.
    planar_prior_sigmas: [0.02, 0.009, 0.009]   # z (m), roll, pitch (rad)

marker_node:
  ros__parameters:
    use_sim_time: true
    detections_topic: /whycode/poses
    # Markers are position-only (x, y, z) anchors; orientation is never used.
    marker_position_sigma_m: 0.10
    # Known marker map: id -> position in the map frame (sim corner markers).
    known_marker_ids: [0, 1, 2, 3]
    known_marker_positions: [ 4.5,  4.5, 1.0,
                             -4.5,  4.5, 1.0,
                             -4.5, -4.5, 1.0,
                              4.5, -4.5, 1.0]

vo_node:
  ros__parameters:
    use_sim_time: true
    image_topic: /camera/image_raw
    camera_info_topic: /camera/camera_info
    odom_topic: /olive/visual_odom
