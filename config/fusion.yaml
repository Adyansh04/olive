# OLIVE sensor-fusion configuration
#
# One file drives the whole stack:
#   - `modalities` is read by sensor_fusion.launch.py to decide which
#     front-end nodes to start. Any source can be switched off here.
#   - Each node then loads its own `<node_name>: ros__parameters:` section.
#
# Frames follow REP-105: map -> odom -> base_footprint -> base_link. With
# publish_odom_tf the fusion backend owns BOTH edges: the smooth, jump-free
# odom->base_footprint (scan increments + wheel + gyro; what Nav2's controller
# should consume) and the map->odom correction (marker anchors and loop
# closures jump HERE, never in the odom frame).

modalities:
  lio: true        # LiDAR-inertial core (fusion_node backbone)
  wheel: true      # wheel-odometry factors from /odom        (fusion_node input)
  markers: true    # WhyCode fiducial position anchors        (marker_node)
  vo: false        # monocular visual odometry                (vo_node)

fusion_node:
  ros__parameters:
    use_sim_time: true
    autostart: true          # self-configure + activate on startup

    points_topic: /lidar/points
    imu_topic: /imu/data
    odom_topic: /olive/odometry

    odom_frame: odom
    base_frame: base_link
    map_frame: map
    wheel_odom_topic: /odom

    # REP-105 TF ownership. publish_map_tf: the map->odom correction.
    # publish_odom_tf: this node ALSO owns the smooth odom->base_footprint
    # edge (the sim DiffDrive TF is disabled to match); the jump-free local
    # odometry is published on smooth_odom_topic for Nav2's controller.
    publish_map_tf: true
    publish_odom_tf: true
    smooth_odom_topic: /olive/odometry_local
    smooth_odom_rate_hz: 50.0
    odom_child_frame: base_footprint
    # base_link in the base_footprint frame (mirrors the URDF base_joint);
    # overridden from TF when extrinsics_from_tf is on.
    odom_child_to_base_xyz: [0.0, 0.0, 0.06]
    use_planar_prior: true

    # Fixed base<-lidar extrinsic (from the URDF; TF-driven on real hardware later)
    lidar_translation: [0.0, 0.0, 0.145]
    lidar_rpy: [0.0, 0.0, 0.0]
    # IMU mounting rotation (base <- imu). Real IMUs are rarely axis-aligned.
    imu_rpy: [0.0, 0.0, 0.0]

    # IMU startup initialization: the robot should be stationary for this
    # window so the gyro bias can be estimated; scans are held until then.
    # On timeout the node proceeds with zero bias (and warns).
    # IMU tight coupling: velocity + bias states in the graph, chained by
    # preintegrated CombinedImuFactors. The graph then estimates the gyro and
    # accel bias ONLINE (fed back to deskew/prediction); the stationary init
    # only seeds it. Noise sigmas follow the sim IMU spec (gyro 2e-4 rad/s,
    # accel 1.7e-2 m/s^2 per sample @100 Hz -> continuous 2e-5 / 1.7e-3) with
    # ~5x margin for model error.
    imu_preintegration: true
    accel_noise_sigma: 0.01        # m/s^2/sqrt(Hz)
    gyro_noise_sigma: 1.0e-4       # rad/s/sqrt(Hz)
    accel_bias_rw_sigma: 1.0e-3    # bias random walk (adaptation speed)
    gyro_bias_rw_sigma: 5.0e-4
    integration_sigma: 1.0e-4
    bias_acc_omega_int: 1.0e-4
    debug_imu_state: true          # /olive/debug/bias + /olive/debug/velocity

    imu_init_duration_s: 1.5
    imu_init_max_wait_s: 10.0
    stationary_gyro_thresh_rad_s: 0.02
    stationary_wheel_thresh_m: 0.005
    # Slowly track gyro bias drift during stationary periods (real robots).
    gyro_bias_reestimate: false

    # Cross-sensor time offsets (lidar is the reference clock; the offset is
    # ADDED to each incoming stamp). The node logs per-sensor
    # stamp-to-arrival latency for the first messages to help tune these.
    imu_time_offset_s: 0.0
    wheel_time_offset_s: 0.0
    camera_time_offset_s: 0.0
    # Max extrapolation beyond buffered wheel odometry before queries fail.
    wheel_interp_slack_s: 0.05

    # Optionally read base<-lidar / base<-camera extrinsics from tf_static
    # (URDF via robot_state_publisher) instead of the params above.
    # NOTE: camera_frame must match the frame the detector reports in
    # (sim whycon: camera_link body convention; real: usually optical).
    extrinsics_from_tf: false
    lidar_frame: lidar_link
    camera_frame: camera_link
    extrinsics_tf_timeout_s: 5.0

    # Scan preprocessing. Unorganized (height==1) clouds are supported when
    # they carry a ring field; per-point time fields (time/t/timestamp) are
    # auto-detected and drive gyro deskew. The sim cloud is organized with no
    # time field, so deskew is a no-op there.
    min_range: 0.3
    max_range: 12.0
    point_time_field: auto     # auto | none | <field name>
    ring_field: auto           # auto | <field name> (unorganized clouds)
    deskew_enabled: true
    deskew_time_bins: 32

    # Ground robot: clamp z / roll / pitch after every scan match
    planar_motion: true

    # Feature extraction (curvature window is small: 1 deg azimuth resolution)
    curvature_window: 2
    edge_threshold: 1.0
    planar_threshold: 0.1
    scan_planar_leaf_size: 0.2

    # Scan-to-map matcher
    matcher_max_iterations: 30
    degeneracy_eigen_threshold: 100.0

    # Keyframe policy: a new graph pose is created when any threshold trips.
    keyframe_translation_m: 0.5
    keyframe_rotation_deg: 12.0
    local_map_radius_m: 25.0
    local_map_recent_s: 10.0
    map_edge_leaf_size: 0.1
    map_planar_leaf_size: 0.2
    # Bounded cloud storage: outside the recent window, one keyframe's clouds
    # per cloud_voxel_m cell survive (the oldest); the LRU cap is a safety
    # net. Poses are always kept. 0 disables either bound.
    cloud_voxel_m: 1.5
    max_cloud_keyframes: 400

    # Debug / RViz visualization (topics under /olive/debug/*).
    # All flags are live-switchable: ros2 param set /fusion_node publish_debug true
    publish_debug: true          # master switch
    debug_path: true             # fused keyframe trajectory      (nav_msgs/Path)
    debug_keyframes: true        # keyframe poses                 (PoseArray)
    debug_local_map: true        # local edge/planar feature maps (PointCloud2)
    debug_scan_features: true    # current scan features, map frame (PointCloud2)
    debug_fiducials: true        # known markers + anchor rays    (MarkerArray)

    # Health monitoring & degradation. Sensor timeouts feed /diagnostics;
    # a failed or degenerate scan match widens the LiDAR factor instead of
    # silently keeping centimeter confidence; wheel sigmas widen with the
    # turning/distance actually covered (slip enters through rotation).
    diagnostics_period_s: 1.0
    lidar_timeout_s: 1.0
    imu_timeout_s: 0.5
    wheel_timeout_s: 0.5
    # Degenerate scans: the matcher's internal eigen-projector already
    # freezes the weak direction of the solution, so blanket inflation is
    # OFF by default (1.0) — it discards the five good directions too and
    # measurably hurts. Raise on hardware with real slides/slip. The health
    # monitor flags DEGRADED either way. Match FAILURE (dead-reckoned
    # keyframe) is untrusted in every direction and stays heavily inflated.
    degenerate_sigma_scale: 1.0
    match_fail_sigma_scale: 50.0
    wheel_yaw_sigma_per_rad: 2.0
    wheel_dist_sigma_per_m: 0.1
    # Catch-all for near-degenerate scenes the eigenvalue threshold misses:
    # a scan-match translation contradicting the wheels by more than this
    # (per keyframe interval) loses its authority.
    wheel_lidar_disagree_m: 0.15
    # LiDAR-dropout coasting: keep output + TF alive on wheel dead-reckoning.
    coast_on_dropout: true
    lidar_dropout_timeout_s: 1.0
    # Also create wheel-paced keyframes during an outage (lets marker anchors
    # keep landing); off by default.
    dropout_keyframes: false
    prediction_gap_wheel_fallback_s: 0.5

    # Loop closure: when the robot revisits a place it mapped earlier
    # (sufficiently old, cloud-bearing, good-quality keyframes), an ICP
    # alignment against that neighborhood adds a robust between factor and
    # the existing correction machinery bends the trajectory. The implied
    # correction is sanity-gated: one false loop can fold the map.
    loop_closure_enabled: true
    loop_search_radius_m: 3.0
    loop_min_time_diff_s: 30.0
    loop_submap_half_width: 12
    loop_fitness_threshold: 0.3
    loop_max_correction_m: 3.0
    loop_min_interval_s: 5.0
    loop_sigma_floor: 0.05

    # iSAM2 backend
    optimize_budget_warn_ms: 50.0
    relinearize_threshold: 0.1
    relinearize_skip: 1

    # WhyCode fiducials (position-only; orientation is never used).
    # marker_mode landmark = TagSLAM-style: markers are Point3 VARIABLES in
    # the graph. Surveyed ids get a world-position prior (anchoring); any
    # other accepted marker is a free landmark whose repeated sightings
    # constrain relative motion — an odometry source. "anchor" restores the
    # legacy unary factor (surveyed ids only).
    marker_mode: landmark
    # World-prior sigma for surveyed ids. The sim survey is exact, so pin it
    # tight (0.01 -> ATE 0.054 RMSE, beats the legacy anchor's 0.059); looser
    # values let the landmark absorb detector bias, trading RMSE for a lower
    # worst-case (0.02 -> RMSE 0.071 / max 0.110). Match YOUR survey accuracy.
    marker_survey_sigma_m: 0.01
    marker_accept_unknown_ids: true    # decoded but unsurveyed -> free landmark
    marker_accept_undecoded_ids: true  # id bits failed -> tracking-id landmark
                                       # (circle-fit position is still good)
    marker_topic: /whycode/poses
    # The detector reports marker positions in the camera_link body frame
    # (x forward, y left, z up) — NOT the optical convention.
    camera_translation: [0.2, 0.0, 0.06]          # base <- camera_link (URDF)
    camera_rpy: [0.0, 0.0, 0.0]
    marker_position_sigma_m: 0.10
    marker_stamp_window_s: 0.1   # tight: at 0.25 m/s a loose window smears anchors
    marker_min_range_m: 0.5
    marker_max_range_m: 6.0
    marker_min_track_frames: 3
    # Motion gate: reject detections while turning/moving fast (real cameras
    # blur and the detector centroid lags; sim drives stay below these).
    marker_max_yaw_rate_rad_s: 0.6
    marker_max_speed_m_s: 1.0
    # Known marker map: id -> surveyed position in the GLOBAL (world) frame.
    # The graph's map frame starts at the robot spawn; the first accepted
    # marker anchor bends the trajectory into this global frame (the X(0)
    # prior is deliberately loose in translation and yaw to allow it).
    # Values below: the maze world (markers at the corners, facing center).
    # Decoded IDs are model index + 1 (verified empirically in sim).
    # z is in the MAP frame, whose origin is at base_link start height
    # (0.06 m above ground) — marker centers sit 1.2 m above ground = 1.14.
    known_marker_ids: [1, 2, 3, 4]
    known_marker_positions: [ 7.5,  7.5, 1.14,
                             -7.5,  7.5, 1.14,
                             -7.5, -7.5, 1.14,
                              7.5, -7.5, 1.14]

    # Visual odometry input (used only when the vo modality is enabled)
    vo_topic: /olive/visual_odom
    vo_between_sigmas: [0.1, 0.1, 1.0, 1.0, 1.0, 0.1]

    # Noise sigmas, ROS order [x, y, z, roll, pitch, yaw] (m / rad).
    # Scan-match confidence is not well calibrated -> hand-tuned here.
    lidar_between_sigmas: [0.01, 0.01, 0.01, 0.001, 0.001, 0.001]
    # Wheel: tight x/y (metric-scale anchor), loose yaw and z/roll/pitch
    # (slip enters through rotation). Used from the wheel stage onward.
    wheel_between_sigmas: [0.03, 0.03, 0.5, 0.5, 0.5, 0.2]
    # Soft planar prior pinning z / roll / pitch for ground motion.
    planar_prior_sigmas: [0.02, 0.009, 0.009]   # z (m), roll, pitch (rad)

vo_node:
  ros__parameters:
    use_sim_time: true
    autostart: true
    image_topic: /camera/image_raw
    camera_info_topic: /camera/camera_info
    wheel_odom_topic: /odom          # metric scale source (monocular scale
                                     # is unobservable on this platform)
    odom_topic: /olive/visual_odom
    max_features: 300
    min_tracked_features: 15
    min_parallax_px: 5.0
    ransac_threshold_px: 1.0
    min_wheel_motion_m: 0.03
