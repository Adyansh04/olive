# LiDAR Odometry Parameters
#
# Two-tier registration for ground robots:
# - Primary: Feature-based scan-to-map using edge/planar features
# - Fallback: GICP when features are insufficient
#
# All poses constrained to (x, y, yaw) for 2D ground navigation.

lidar_odom_node:
  ros__parameters:
    # === Sensor Configuration ===
    is_3d: true

    # === Keyframe Management ===
    # When to update the local map
    keyframe_distance: 0.3       # meters
    keyframe_rotation: 0.15      # radians (~8.5 degrees)

    # === Point Cloud Filtering ===
    voxel_leaf_size: 0.15        # meters
    min_points_threshold: 50

    # === GICP Fallback Parameters ===
    max_correspondence_dist: 1.0  # meters
    max_iterations: 15
    transformation_epsilon: 1.0e-4
    fitness_epsilon: 1.0e-2

    # === Covariance Estimation ===
    nominal_pos_std: 0.02         # meters
    nominal_rot_std: 0.02         # radians
    poor_fit_scale: 3.0
    fitness_threshold: 0.8

    # === Motion Model ===
    frame_fitness_threshold: 1.0
    max_frame_distance: 1.0       # max expected motion between frames (m)
    velocity_filter_alpha: 0.3
    degeneracy_threshold: 100.0

    # === Feature Extraction ===
    # Edge features: high curvature (corners, object edges)
    # Planar features: low curvature (walls, floors)
    use_feature_registration: true
    edge_curvature_threshold: 0.1
    planar_curvature_threshold: 0.05   # Relaxed from 0.01 - simulation has higher curvature noise
    max_edge_features: 400
    max_planar_features: 800

    # === Local Map ===
    # Sliding window of keyframes for scan-to-map registration
    local_map_size: 10
    local_map_voxel_size: 0.2

    # === Frame IDs ===
    odom_frame_id: "odom"
    lidar_frame_id: "lidar_link"